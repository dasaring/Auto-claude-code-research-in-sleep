name: CI

on:
  pull_request:
    branches:
      - aris-code
      - main
  push:
    branches:
      - aris-code
      - main

# Cancel in-progress runs for the same PR/branch when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo build (workspace)
        run: cargo build --workspace --all-targets

      - name: cargo test (per crate)
        run: |
          cargo test -p api
          cargo test -p runtime
          cargo test -p tools
          cargo test -p commands
          cargo test -p aris-cli
          cargo test -p compat-harness

      - name: cargo clippy (workspace, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check
